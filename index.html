<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gym Tracker</title>
<meta name="theme-color" content="#1A1A2E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0f0f1a; --card:#1a1a2e; --card2:#20223a; --border:#33355a;
    --text:#eef0ff; --muted:#9aa0c3; --accent:#4fd1a5;
    --push:#C0392B; --pull:#1A5276; --legs:#117A65; --upper:#117864; --lower:#7D6608;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;}
  header{padding:18px 16px 8px;position:sticky;top:0;background:var(--bg);z-index:5;}
  h1{font-size:20px;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:13px;}
  .tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;}
  .tab{padding:8px 14px;border-radius:20px;background:var(--card2);color:var(--muted);border:1px solid var(--border);font-size:13px;white-space:nowrap;cursor:pointer;}
  .tab.active{background:var(--accent);color:#0f0f1a;font-weight:600;border-color:var(--accent);}
  main{padding:0 16px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:10px;}
  label:first-child{margin-top:0;}
  input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 10px;font-size:14px;}
  .row{display:flex;gap:8px;}
  .row>*{flex:1;}
  .daytype-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  .daytype-grid button{padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:12px;cursor:pointer;}
  .daytype-grid button.sel{color:#fff;font-weight:700;border-color:transparent;}
  .daytype-grid button[data-t="PUSH"].sel{background:var(--push);}
  .daytype-grid button[data-t="PULL"].sel{background:var(--pull);}
  .daytype-grid button[data-t="LEGS"].sel{background:var(--legs);}
  .daytype-grid button[data-t="UPPER"].sel{background:var(--upper);}
  .daytype-grid button[data-t="LOWER"].sel{background:var(--lower);}
  .ex{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--card2);}
  .ex-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .ex-head strong{font-size:13px;color:var(--muted);}
  .icon-btn{background:none;border:none;color:#e57373;font-size:18px;cursor:pointer;padding:2px 6px;}
  .series-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px;}
  .series-grid input{padding:8px 6px;font-size:13px;text-align:center;}
  .btn{width:100%;padding:12px;border-radius:10px;border:none;font-weight:600;font-size:14px;cursor:pointer;margin-top:8px;}
  .btn-primary{background:var(--accent);color:#0f0f1a;}
  .btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
  .btn-danger{background:transparent;color:#e57373;border:1px solid #e57373;}
  .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);}
  pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace;font-size:12.5px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;line-height:1.5;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0f0f1a;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .hist-item{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--card2);}
  .hist-item .meta{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 10px;}
</style>
</head>
<body>
<header>
  <h1>🏋️ Gym Tracker</h1>
  <div class="sub">Registra tu sesión y genera el reporte — funciona sin internet</div>
</header>

<div class="tabs">
  <div class="tab active" data-view="log">Sesión</div>
  <div class="tab" data-view="report">Reporte</div>
  <div class="tab" data-view="history">Historial</div>
</div>

<main>
  <!-- LOG VIEW -->
  <section id="view-log">
    <div class="card">
      <label>Fecha</label>
      <input type="date" id="f-date">
      <div class="row">
        <div>
          <label>Día #</label>
          <input type="number" id="f-daynum" min="1" value="1">
        </div>
        <div>
          <label>Tipo de día</label>
        </div>
      </div>
      <div class="daytype-grid" id="daytype-grid">
        <button data-t="PUSH">PUSH</button>
        <button data-t="PULL">PULL</button>
        <button data-t="LEGS">LEGS</button>
        <button data-t="UPPER">UPPER</button>
        <button data-t="LOWER">LOWER</button>
      </div>
      <button class="btn btn-outline" id="btn-load-routine">📋 Cargar ejercicios de la rutina (<span id="routine-daytype-label">PUSH</span>)</button>
      <div class="row">
        <div>
          <label>🕐 Entrada</label>
          <input type="time" id="f-entry">
        </div>
        <div>
          <label>🏁 Salida</label>
          <input type="time" id="f-exit">
        </div>
      </div>
    </div>

    <div id="exercise-list"></div>

    <button class="btn btn-secondary" id="btn-add-ex">+ Añadir ejercicio</button>
  </section>

  <!-- REPORT VIEW -->
  <section id="view-report" style="display:none;">
    <div class="card">
      <pre id="report-text">Aún no hay datos. Completa la sesión primero.</pre>
      <button class="btn btn-primary" id="btn-copy">📋 Copiar reporte</button>
      <button class="btn btn-secondary" id="btn-finish">✅ Guardar en historial y limpiar</button>
    </div>
  </section>

  <!-- HISTORY VIEW -->
  <section id="view-history" style="display:none;">
    <div id="history-list"></div>
    <button class="btn btn-danger" id="btn-clear-hist">Borrar historial</button>
  </section>
</main>

<datalist id="exercise-names"></datalist>

<div class="toast" id="toast"></div>

<script>
const DAY_EMOJI = {PUSH:'🔴',PULL:'🔵',LEGS:'🟢',UPPER:'🟡',LOWER:'🟠'};
const DRAFT_KEY = 'gymtracker_draft_v1';
const HIST_KEY = 'gymtracker_history_v1';

// Rutina PPLUL — ejercicios exactos de la hoja "💪 Rutina Semanal" del Excel,
// en el orden en que se entrenan cada día.
const ROUTINE = {
  PUSH: [
    'Press de banca plano con barra',
    'Press inclinado con mancuernas (30–45°)',
    'Press militar con mancuernas sentado',
    'Elevaciones laterales con mancuernas',
    'Fondos en paralelas (o press en máquina)',
    'Extensión de tríceps en polea (cuerda)'
  ],
  PULL: [
    'Dominadas (o jalón al pecho en polea)',
    'Remo con barra (Pendlay o estándar)',
    'Remo con mancuerna a una mano',
    'Face Pull en polea alta (cuerda)',
    'Curl de bíceps con barra EZ',
    'Curl martillo con mancuernas alternado'
  ],
  LEGS: [
    'Sentadilla con barra (trasera)',
    'Prensa de piernas (45°)',
    'Extensión de cuádriceps en máquina',
    'Peso muerto rumano con barra',
    'Curl femoral tumbado en máquina',
    'Elevación de pantorrilla de pie (máquina o escalón)'
  ],
  UPPER: [
    'Press banca inclinado con barra (30°)',
    'Jalón al pecho en polea agarre cerrado',
    'Press Arnold con mancuernas',
    'Remo en polea baja sentado (agarre ancho)',
    'Aperturas con mancuernas (banco plano)',
    'Elevaciones laterales en polea baja',
    'Curl predicador con barra EZ',
    'Press francés con mancuernas'
  ],
  LOWER: [
    'Peso muerto convencional con barra',
    'Sentadilla búlgara con mancuernas',
    'Hip Thrust con barra en banco',
    'Curl femoral sentado en máquina',
    'Zancadas caminando con mancuernas',
    'Elevación de pantorrilla sentado (máquina)'
  ]
};

let state = loadDraft() || {
  date: todayISO(), dayType: 'PUSH', dayNum: 1, entry: '', exit: '',
  exercises: [emptyExercise()]
};

function todayISO(){ return new Date().toISOString().slice(0,10); }
function emptyExercise(name){ return { name: name||'', rpe:'', series:['','','',''] }; }
function loadDraft(){ try{ return JSON.parse(localStorage.getItem(DRAFT_KEY)); }catch(e){ return null; } }
function saveDraft(){ localStorage.setItem(DRAFT_KEY, JSON.stringify(state)); }
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }catch(e){ return []; } }
function saveHistory(list){ localStorage.setItem(HIST_KEY, JSON.stringify(list)); }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

// ---- Datalist de nombres de ejercicio (autocompletar al escribir) ----
function populateDatalist(){
  const dl = document.getElementById('exercise-names');
  const all = new Set();
  Object.values(ROUTINE).forEach(list => list.forEach(n => all.add(n)));
  dl.innerHTML = Array.from(all).map(n => `<option value="${escapeHtml(n)}"></option>`).join('');
}

// ---- Rendering ----
function renderTop(){
  document.getElementById('f-date').value = state.date;
  document.getElementById('f-daynum').value = state.dayNum;
  document.getElementById('f-entry').value = state.entry;
  document.getElementById('f-exit').value = state.exit;
  document.querySelectorAll('#daytype-grid button').forEach(b=>{
    b.classList.toggle('sel', b.dataset.t === state.dayType);
  });
  document.getElementById('routine-daytype-label').textContent = state.dayType;
}

function renderExercises(){
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  state.exercises.forEach((ex, i)=>{
    const div = document.createElement('div');
    div.className = 'ex';
    div.innerHTML = `
      <div class="ex-head">
        <strong>Ejercicio ${i+1}</strong>
        <button class="icon-btn" data-remove="${i}">✕</button>
      </div>
      <label>Nombre</label>
      <input type="text" list="exercise-names" data-field="name" data-idx="${i}" value="${escapeHtml(ex.name)}" placeholder="Ej: Press banca plano">
      <div class="series-grid">
        ${ex.series.map((s,si)=>`<input type="text" data-series="${si}" data-idx="${i}" value="${escapeHtml(s)}" placeholder="S${si+1}: kg×reps">`).join('')}
      </div>
      <label>RPE</label>
      <input type="number" min="1" max="10" data-field="rpe" data-idx="${i}" value="${escapeHtml(ex.rpe)}" placeholder="1-10">
    `;
    list.appendChild(div);
  });
}

function escapeHtml(v){ return (v||'').toString().replace(/"/g,'&quot;'); }

function renderAll(){ renderTop(); renderExercises(); saveDraft(); }

// ---- Events ----
document.getElementById('f-date').addEventListener('input', e=>{ state.date=e.target.value; saveDraft(); });
document.getElementById('f-daynum').addEventListener('input', e=>{ state.dayNum=e.target.value; saveDraft(); });
document.getElementById('f-entry').addEventListener('input', e=>{ state.entry=e.target.value; saveDraft(); });
document.getElementById('f-exit').addEventListener('input', e=>{ state.exit=e.target.value; saveDraft(); });

document.getElementById('daytype-grid').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  state.dayType = b.dataset.t; renderTop(); saveDraft();
});

document.getElementById('btn-load-routine').addEventListener('click', ()=>{
  const preset = ROUTINE[state.dayType] || [];
  const hasData = state.exercises.some(ex => ex.name || ex.rpe || ex.series.some(s=>s));
  if(hasData && !confirm(`Esto reemplaza los ${state.exercises.length} ejercicio(s) actuales por los ${preset.length} de ${state.dayType}. ¿Continuar?`)){
    return;
  }
  state.exercises = preset.map(name => emptyExercise(name));
  renderExercises(); saveDraft();
  toast(`Ejercicios de ${state.dayType} cargados ✓`);
});

document.getElementById('exercise-list').addEventListener('input', e=>{
  const idx = e.target.dataset.idx; if(idx===undefined) return;
  if(e.target.dataset.field==='name') state.exercises[idx].name = e.target.value;
  if(e.target.dataset.field==='rpe') state.exercises[idx].rpe = e.target.value;
  if(e.target.dataset.series!==undefined) state.exercises[idx].series[e.target.dataset.series] = e.target.value;
  saveDraft();
});

document.getElementById('exercise-list').addEventListener('click', e=>{
  const idx = e.target.dataset.remove;
  if(idx===undefined) return;
  state.exercises.splice(idx,1);
  if(state.exercises.length===0) state.exercises.push(emptyExercise());
  renderExercises(); saveDraft();
});

document.getElementById('btn-add-ex').addEventListener('click', ()=>{
  state.exercises.push(emptyExercise());
  renderExercises(); saveDraft();
});

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    ['log','report','history'].forEach(v=>{
      document.getElementById('view-'+v).style.display = (v===tab.dataset.view) ? '' : 'none';
    });
    if(tab.dataset.view === 'report') renderReport();
    if(tab.dataset.view === 'history') renderHistory();
  });
});

// ---- Report generation ----
function fmtDate(iso){
  if(!iso) return '__/__/____';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function buildReportText(){
  let lines = [];
  lines.push(`📅 ${fmtDate(state.date)} — DÍA ${state.dayNum} — ${state.dayType}`);
  lines.push(`🕐 Entrada: ${state.entry||'--:--'}  |  🏁 Salida: ${state.exit||'--:--'}`);
  lines.push('─'.repeat(36));
  state.exercises.forEach((ex,i)=>{
    if(!ex.name) return;
    lines.push(`${
