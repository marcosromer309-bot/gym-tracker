<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gym Tracker — Marcos</title>
<meta name="theme-color" content="#1a1a24">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e3e;
    --text: #f0f0f5;
    --muted: #8888aa;
    --push: #e74c3c;
    --pull: #2980b9;
    --legs: #27ae60;
    --upper: #8e44ad;
    --lower: #e67e22;
    --accent: #3498db;
    --green: #2ecc71;
    --yellow: #f1c40f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* DATE & TIME */
  .date-bar {
    background: var(--surface2);
    padding: 10px 20px;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .date-bar input[type="date"],
  .date-bar input[type="time"] {
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
  }
  .date-bar .separator { color: var(--border); margin: 0 2px; }

  /* GYM TIMER */
  .gym-timer {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .gym-timer-left { display: flex; align-items: center; gap: 10px; }
  .gym-timer-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .gym-timer-display {
    font-size: 22px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    color: var(--green);
  }
  .gym-timer-display.stopped { color: var(--muted); }
  .gym-timer-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .gym-timer-btn.running { border-color: #e74c3c; color: #e74c3c; }
  .gym-timer-btn.start   { border-color: var(--green); color: var(--green); }

  /* REST TIMER */
  .rest-timer-bar {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 400px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 16px;
    padding: 12px 16px;
    z-index: 150;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .rest-timer-bar.visible { display: block; }
  .rest-timer-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .rest-timer-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .rest-timer-count {
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    text-align: center;
    margin: 4px 0 10px;
  }
  .rest-timer-count.warning { color: var(--yellow); }
  .rest-timer-count.done    { color: var(--green); }
  .rest-progress {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .rest-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s linear;
  }
  .rest-presets {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .rest-preset-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .rest-preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rest-timer-actions { display: flex; gap: 8px; }
  .rest-action-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 9px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .rest-action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .rest-action-btn.close-btn { color: var(--muted); }

  /* DAY SELECTOR */
  .day-selector {
    padding: 16px 20px 8px;
  }
  .day-selector h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
  .day-buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .day-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    user-select: none;
  }
  .day-btn .emoji { font-size: 18px; display: block; margin-bottom: 4px; }
  .day-btn.push.active  { background: var(--push);  border-color: var(--push);  color: white; }
  .day-btn.pull.active  { background: var(--pull);  border-color: var(--pull);  color: white; }
  .day-btn.legs.active  { background: var(--legs);  border-color: var(--legs);  color: white; }
  .day-btn.upper.active { background: var(--upper); border-color: var(--upper); color: white; }
  .day-btn.lower.active { background: var(--lower); border-color: var(--lower); color: white; }
  .day-btn:not(.active):hover { border-color: #555; color: var(--text); }

  /* DAY DESCRIPTION */
  .day-desc {
    margin: 0 20px 4px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    color: white;
    display: none;
  }
  .day-desc.visible { display: block; }
  .day-desc.push  { background: var(--push); }
  .day-desc.pull  { background: var(--pull); }
  .day-desc.legs  { background: var(--legs); }
  .day-desc.upper { background: var(--upper); }
  .day-desc.lower { background: var(--lower); }

  /* EXERCISES */
  .exercises { padding: 12px 20px; display: flex; flex-direction: column; gap: 14px; }

  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .exercise-header {
    padding: 12px 14px 8px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .exercise-info { flex: 1; }
  .exercise-num { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .exercise-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .exercise-target { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* RPE badge */
  .rpe-container { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 50px; }
  .rpe-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .rpe-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
    width: 50px;
    height: 36px;
    text-align: center;
    outline: none;
    cursor: pointer;
  }

  /* SETS */
  .sets-area { padding: 0 14px 12px; }
  .sets-header {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 28px;
    gap: 6px;
    margin-bottom: 6px;
    padding: 0 2px;
  }
  .sets-header span { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
  .sets-header span:first-child { text-align: left; }

  .set-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 28px;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .set-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-align: center;
  }
  .set-input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    height: 40px;
    text-align: center;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .set-input::-webkit-inner-spin-button, .set-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .set-input:focus { border-color: var(--accent); }
  .set-input::placeholder { color: #555; font-size: 12px; }
  .set-delete {
    background: none;
    border: none;
    color: #cc4444;
    font-size: 18px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    padding: 0;
  }
  .set-delete:hover { background: rgba(204,68,68,0.15); }

  .add-set-btn {
    width: 100%;
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    padding: 8px;
    cursor: pointer;
    margin-top: 2px;
    transition: all 0.15s;
  }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* NOTES */
  .notes-area { padding: 0 14px 12px; }
  .notes-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    font-family: inherit;
    height: 60px;
    transition: border-color 0.15s;
  }
  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: #555; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* GENERATE BUTTON */
  .generate-area {
    padding: 8px 20px 20px;
    position: sticky;
    bottom: 0;
    background: linear-gradient(to bottom, transparent, var(--bg) 40%);
    padding-top: 20px;
  }
  .generate-btn {
    width: 100%;
    background: var(--green);
    border: none;
    border-radius: 14px;
    color: #0a1f0a;
    font-size: 16px;
    font-weight: 800;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .generate-btn:hover { background: #27ae60; }
  .generate-btn:active { transform: scale(0.98); }

  /* REPORT MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--border);
  }
  .modal-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 16px; font-weight: 700; }
  .modal-close {
    background: var(--surface2);
    border: none;
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .report-text {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
    font-family: 'SF Mono', 'Courier New', monospace;
    min-height: 120px;
  }
  .modal-footer { padding: 12px 20px 24px; }
  .copy-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    padding: 15px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn.copied { background: var(--green); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* SKIPPED toggle */
  .skip-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    margin-left: 8px;
    white-space: nowrap;
  }
  .skip-btn.skipped { background: #cc444422; border-color: #cc4444; color: #cc4444; }
</style>
</head>
<body>

<div class="header">
  <h1>🏋️ Gym Tracker</h1>
  <p>Marcos · Rutina PPLUL Hipertrofia</p>
</div>

<div class="date-bar">
  📅 <input type="date" id="sessionDate">
  <span class="separator">|</span>
  🕐 Entrada: <input type="time" id="entryTime">
  <span class="separator">|</span>
  🏁 Salida: <input type="time" id="exitTime" onchange="updateDuration()">
</div>

<div class="gym-timer">
  <div class="gym-timer-left">
    <div>
      <div class="gym-timer-label">Tiempo en gym</div>
      <div class="gym-timer-display stopped" id="gymTimerDisplay">00:00:00</div>
    </div>
  </div>
  <button class="gym-timer-btn start" id="gymTimerBtn" onclick="toggleGymTimer()">▶ Iniciar</button>
</div>

<!-- REST TIMER -->
<div class="rest-timer-bar" id="restTimerBar">
  <div class="rest-timer-top">
    <span class="rest-timer-label">⏱ Descanso</span>
    <button onclick="closeRestTimer()" style="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;">✕</button>
  </div>
  <div class="rest-timer-count" id="restTimerCount">1:30</div>
  <div class="rest-progress"><div class="rest-progress-fill" id="restProgressFill" style="width:100%"></div></div>
  <div class="rest-presets">
    <button class="rest-preset-btn" onclick="setRestTimer(60)">1 min</button>
    <button class="rest-preset-btn" onclick="setRestTimer(75)">1:15</button>
    <button class="rest-preset-btn" onclick="setRestTimer(90)">1:30</button>
    <button class="rest-preset-btn" onclick="setRestTimer(120)">2 min</button>
    <button class="rest-preset-btn" onclick="setRestTimer(180)">3 min</button>
  </div>
  <div class="rest-timer-actions">
    <button class="rest-action-btn" onclick="resetRestTimer()">↺ Reiniciar</button>
    <button class="rest-action-btn primary" onclick="pauseRestTimer()" id="restPauseBtn">⏸ Pausar</button>
    <button class="rest-action-btn close-btn" onclick="closeRestTimer()">Cerrar</button>
  </div>
</div>

<div class="day-selector">
  <h2>¿Qué día toca hoy?</h2>
  <div class="day-buttons">
    <div class="day-btn push" onclick="selectDay('push')">
      <span class="emoji">🔴</span>PUSH
    </div>
    <div class="day-btn pull" onclick="selectDay('pull')">
      <span class="emoji">🔵</span>PULL
    </div>
    <div class="day-btn legs" onclick="selectDay('legs')">
      <span class="emoji">🟢</span>LEGS
    </div>
    <div class="day-btn upper" onclick="selectDay('upper')">
      <span class="emoji">🟣</span>UPPER
    </div>
    <div class="day-btn lower" onclick="selectDay('lower')">
      <span class="emoji">🟠</span>LOWER
    </div>
  </div>
</div>

<div id="dayDesc" class="day-desc"></div>

<div id="exerciseList" class="exercises">
  <div class="empty-state">
    <div class="icon">👆</div>
    <p>Selecciona el día para ver los ejercicios</p>
  </div>
</div>

<div class="generate-area">
  <button class="generate-btn" onclick="generateReport()">⚡ Generar Reporte</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>📋 Reporte listo</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="report-text" id="reportText"></div>
    </div>
    <div class="modal-footer">
      <button class="copy-btn" id="copyBtn" onclick="copyReport()">📋 Copiar y pegar a Claude</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
